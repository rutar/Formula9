name: Deploy obfuscated build to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install javascript-obfuscator
        run: npm install -g javascript-obfuscator

      - name: Build obfuscated dist
        run: |
          rsync -a --exclude='.git' --exclude='.github' --exclude='*.md' . dist/
          find dist/src -name "*.js" | while read file; do
            javascript-obfuscator "$file" \
              --output "$file" \
              --compact true \
              --string-array true \
              --string-array-encoding base64 \
              --rename-globals false \
              --self-defending false \
              --debug-protection false
          done

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          clean: true
